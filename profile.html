<!DOCTYPE html>
<html lang="en-IN">
<head>
<title>Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">

  <div class="d-flex justify-content-between align-items-center mb-3">

    <h3>Your Profile</h3>

    <button
      id="editBtn"
      type="button"
      class="btn btn-primary float-end"
      onclick="enableEdit()"
    >
      Update Details
    </button>

  </div>

  <p id="emailSection">
    <b>Email:</b>
    <span id="emailText"></span>
  </p>

  <input id="email" type="hidden">

  <p>
    <b>Name:</b>

    <span id="nameText"></span>

    <input	
      id="name"
      class="form-control mt-1 edit-field"
      style="display:none;"
    >
  </p>

  <p>
    <b>Age:</b>

    <span id="ageText"></span>

    <input
      id="age"
      class="form-control mt-1 edit-field"
      style="display:none;"
    >
  </p>

  <p>
    <b>DOB:</b>

    <span id="dobText"></span>

    <input
      id="dob"
      class="form-control mt-1 edit-field"
      style="display:none;"
    >
  </p>

  <p>
    <b>Contact:</b>

    <span id="contactText"></span>

    <input
      id="contact"
      class="form-control mt-1 edit-field"
      style="display:none;"
    >
  </p>

  <p>
    <b>Address:</b>

    <span id="addressText"></span>

    <input
      id="address"
      class="form-control mt-1 edit-field"
      style="display:none;"
    >
  </p>

  <p>
    <b>City:</b>

    <span id="cityText"></span>

    <input
      id="city"
      class="form-control mt-1 edit-field"
      style="display:none;"
    >
  </p>

  <p>
    <b>Country:</b>

    <span id="countryText"></span>

    <input
      id="country"
      class="form-control mt-1 edit-field"
      style="display:none;"
    >
  </p>

  <p>
    <b>Pincode:</b>

    <span id="pincodeText"></span>

    <input
      id="pincode"
      class="form-control mt-1 edit-field"
      style="display:none;"
    >
  </p>

  <button
    id="saveBtn"
    type="button"
    onclick="updateProfile()"
    class="btn btn-success w-100 mb-3"
    style="display:none;" 
  >
    Save Changes
  </button>

  <button onclick="logout()" class="btn btn-danger w-100">
    Logout
  </button>

</div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="assets/js/profile.js?v=2"></script>

<script>
</script>
</body>
</html>
