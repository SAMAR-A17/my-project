<!DOCTYPE html>
<html lang="en-IN">
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4 shadow" style="width:350px">

    <h3 class="text-center mb-3">Login</h3>

    <form id="loginForm">

      <!-- EMAIL -->
      <input
        id="email"
        class="form-control mb-3"
        placeholder="Email"
      >

      <!-- LOGIN PASSWORD -->
      <div class="password-wrapper mb-3">

        <input
          id="password"
          type="password"
          class="form-control pe-5"
          placeholder="Password"
          oninput="toggleIcon('loginEye', this)"
        >

        <span
          id="loginEye"
          onclick="togglePassword('password', this)"
          class="toggle-password"
        >
          <i class="fa-solid fa-eye"></i>
        </span>

      </div>

      <!-- LOGIN BUTTON -->
      <button class="btn btn-success w-100">
        Login
      </button>

      <!-- FORGOT PASSWORD -->
      <div class="text-center mt-3">

        <div id="forgotSection" style="display:none;">

          <button
            type="button"
            onclick="showReset()"
            class="forgot-btn"
          >
            Forgot Password?
          </button>

        </div>

      </div>

      <!-- RESET BOX -->
      <div id="resetBox" style="display:none;" class="mt-3">

        <!-- NEW PASSWORD -->
        <div class="password-wrapper mb-3">

          <input
            id="newPass"
            type="password"
            class="form-control pe-5"
            placeholder="New Password"
            oninput="toggleIcon('newEye', this)"
          >

          <span
            id="newEye"
            onclick="togglePassword('newPass', this)"
            class="toggle-password"
          >
            <i class="fa-solid fa-eye"></i>
          </span>

        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="password-wrapper mb-3">

          <input
            id="confirmPass"
            type="password"
            class="form-control pe-5"
            placeholder="Confirm Password"
            oninput="toggleIcon('confirmEye', this)"
          >

          <span
            id="confirmEye"
            onclick="togglePassword('confirmPass', this)"
            class="toggle-password"
          >
            <i class="fa-solid fa-eye"></i>
          </span>

        </div>

        <button
          type="button"
          class="btn btn-warning w-100"
          onclick="resetPassword()"
        >
          Reset Password
        </button>

      </div>

      <p class="text-center mt-3">
        New User?
        <a href="register.html">Sign up</a>
      </p>

    </form>

  </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="assets/js/login.js"></script>

</body>
</html>
